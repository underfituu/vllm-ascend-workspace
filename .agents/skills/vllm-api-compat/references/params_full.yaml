# =============================================================================
# Full vLLM serve CLI parameter test tree for Ascend NPU
# =============================================================================
# Source of truth: references/serve_cli.md (vllm serve --help=all)
#
# Design:
#   - --host / --port are passed via CLI at runtime, not stored here.
#   - Each section has its own `baseline` args list; "inherit" means use
#     default_baseline verbatim. Override with a custom list when needed.
#   - For bool flags, only the positive form (--flag) is listed; --no-flag
#     variants are omitted unless the negative is the interesting test.
#   - Params that cannot be safely tested in isolation are status: SKIP.
#   - type: bool_flag | Enum | int | float | str | positional | json_config
#   - json_config params carry a `subfields` list. Each subfield is tested
#     by composing a JSON object: --flag '{"subfield": value}'.
#   - `requires` on a subfield means it only makes sense when its dependency
#     is satisfied (another subfield value, or a top-level flag).
# =============================================================================

meta:
  description: "Full vLLM serve CLI parameter test tree for Ascend NPU"
  generated_from: references/serve_cli.md
  version: "2.0"

# ---------------------------------------------------------------------------
# Default model & baseline
# ---------------------------------------------------------------------------
default_model: "/home/weights/Qwen3.5-0.8B/"

default_baseline:
  - "--data-parallel-size 1"
  - "--tensor-parallel-size 1"
  - "--seed 1024"
  - "--served-model-name qwen3-next"
  - "--max-num-seqs 28"
  - "--max-model-len 16384"
  - "--max-num-batched-tokens 16384"
  - "--trust-remote-code"
  - "--gpu-memory-utilization 0.7"
  - "--enforce-eager"
  - "--no-disable-hybrid-kv-cache-manager"

